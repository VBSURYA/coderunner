<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Safeguard against third-party scripts/extensions crashing on read-only window.fetch
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              writable: true,
              enumerable: true,
              value: originalFetch
            });
          }
        } catch (e) {
          console.warn('Failed to make window.fetch writable:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
